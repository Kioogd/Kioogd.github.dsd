<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Restringido · EH</title>
    <style>
        body {
            background: #0a0c0f;
            color: #d4af37;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            margin: 0;
            text-align: center;
        }
        .card {
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 40px;
            border-radius: 20px;
            background: #15181e;
            box-shadow: 0 0 20px rgba(196, 30, 30, 0.2);
            cursor: pointer; /* Para que el usuario sepa que debe hacer clic */
        }
        .loader {
            border: 4px solid #1e232b; border-top: 4px solid #c41e1e;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-family: serif; letter-spacing: 2px; }
    </style>
</head>
<body onclick="tocarMusica()">

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/3053/3053493.png" width="80" alt="Logo">
        <h1>SISTEMA ENCRIPTADO</h1>
        <div class="loader"></div>
        <p>Presiona en cualquier lugar para activar el sistema.</p>
        <p style="color: #666; font-size: 0.8rem;">Vibe: Mafia Italiana</p>
    </div>

    <audio id="miMusica" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <script>
        function tocarMusica() {
            var audio = document.getElementById("miMusica");
            audio.play().catch(function(error) {
                console.log("El navegador bloqueó el audio, pero al hacer clic debería sonar.");
            });
        }
    </script>
</body>
</html>
