<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Restringido · EH</title>
    <style>
        body {
            background: #0a0c0f;
            color: #d4af37;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }
        .card {
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 40px;
            border-radius: 20px;
            background: #15181e;
            box-shadow: 0 0 30px rgba(196, 30, 30, 0.4);
            z-index: 2;
            transition: transform 0.3s;
        }
        .card:hover { transform: scale(1.02); }
        .loader {
            border: 4px solid #1e232b;
            border-top: 4px solid #c41e1e;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-family: 'serif'; letter-spacing: 4px; text-shadow: 2px 2px 5px black; }
        
        /* Botón de música discreto */
        #music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 10px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.7rem;
        }
    </style>
</head>
<body onclick="playMusic()">

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/3053/3053493.png" width="80" alt="Logo">
        <h1>SISTEMA ENCRIPTADO</h1>
        <div class="loader"></div>
        <p>Protocolo de audio activado.</p>
        <p style="color: #666; font-size: 0.8rem;">Haz clic en cualquier lugar para escuchar la frecuencia.</p>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <button id="music-control">MÚSICA: OFF</button>

    <script>
        var music = document.getElementById("bgMusic");
        var btn = document.getElementById("music-control");

        function playMusic() {
            music.play();
            btn.innerHTML = "MÚSICA: ON";
            btn.style.background = "rgba(212, 175, 55, 0.4)";
        }

        btn.onclick = function(e) {
            e.stopPropagation(); // Evita el clic del body
            if (music.paused) {
                music.play();
                btn.innerHTML = "MÚSICA: ON";
            } else {
                music.pause();
                btn.innerHTML = "MÚSICA: OFF";
            }
        };
    </script>
</body>
</html>
