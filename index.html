<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Restringido · EH</title>
    <style>
        body {
            background: #0a0c0f;
            color: #d4af37;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            margin: 0;
            text-align: center;
            user-select: none; /* Evita que seleccionen texto */
        }
        .card {
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 40px;
            border-radius: 20px;
            background: #15181e;
            box-shadow: 0 0 20px rgba(196, 30, 30, 0.2);
        }
        .loader {
            border: 4px solid #1e232b;
            border-top: 4px solid #c41e1e;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-family: 'Cormorant Garamond', serif; letter-spacing: 2px; }
    </style>
</head>
<body oncontextmenu="return false;"> <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/3053/3053493.png" width="60" alt="Logo">
        <h1>SISTEMA EN DESARROLLO</h1>
        <div class="loader"></div>
        <p>Lo sentimos, esta sección está siendo encriptada por la Élite.</p>
        <p style="color: #666; font-size: 0.8rem;">Vuelve pronto, Soldado.</p>
    </div>

    <script>
        // Bloqueo de teclas (F12, Ctrl+Shift+I, Ctrl+U, etc.)
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false; // F12
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0))) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ver código fuente
        };

        // Anti-Debugger: Si abren la consola, entrará en un bucle que congela la inspección
        (function() {
            var block = function() {
                setInterval(function() {
                    debugger;
                }, 50);
            };
            try { block(); } catch (err) {}
        })();
        
        console.log("%c¡ALTO! Zona bajo protección de la Élite.", "color: red; font-size: 20px; font-weight: bold;");
    </script>
</body>
</html>
